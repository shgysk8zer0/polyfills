---
name: Node CI
on:
  push:
    branches:
      - master
      - release/*
  pull_request:
    branches:
      - master
      - release/*
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: npm
    - run: npm ci --ignore-scripts --no-audit --no-fund --strict-allow-scripts
    - run: npm run build --if-present
    - run: npm test
